name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: |
        # run tests with JUnit reporter only (JSON no longer needed)
        npx playwright test --reporter=junit
      continue-on-error: true
    - name: Retry Playwright tests if failed
      if: failure()
      run: |
        npx playwright test --reporter=json > results.json
    - name: Parse test summary
      id: parse_test_summary
      if: always()
      run: |
        echo "Parsing JUnit XML"
        xmlfile=$(ls test-results/*.xml | head -n1)
        echo "Using file: $xmlfile"
        # extract attributes from testsuites element
        tests=$(grep -oP 'tests="\K[0-9]+' "$xmlfile" | head -n1 || echo 0)
        failures=$(grep -oP 'failures="\K[0-9]+' "$xmlfile" | head -n1 || echo 0)
        skipped=$(grep -oP 'skipped="\K[0-9]+' "$xmlfile" | head -n1 || echo 0)
        errors=$(grep -oP 'errors="\K[0-9]+' "$xmlfile" | head -n1 || echo 0)
        total=$tests
        passed=$((tests - failures - errors - skipped))
        failed=$((failures + errors))
        echo "JUnit counts: tests=$tests failures=$failures errors=$errors skipped=$skipped"
        echo "Summary: total=$total passed=$passed failed=$failed"
        echo "::set-output name=total::$total"
        echo "::set-output name=passed::$passed"
        echo "::set-output name=failed::$failed"
    - name: Update README with results
      if: always()
      run: |
        total=${{ steps.parse_test_summary.outputs.total }}
        passed=${{ steps.parse_test_summary.outputs.passed }}
        failed=${{ steps.parse_test_summary.outputs.failed }}
        echo "Updating README: $total, $passed, $failed"
        sed -i "s/| *[0-9]* *| *[0-9]* *| *[0-9]* *|/| $total | $passed | $failed |/" README.md
        # also update badge JSON
        color="green"
        if [ "$failed" -gt 0 ]; then color="red"; fi
        echo "{\"schemaVersion\":1,\"label\":\"tests\",\"message\":\"$passed/$total passed ($failed failed)\",\"color\":\"$color\"}" > test-summary.json
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add README.md test-summary.json
        git commit -m "Update test summary: $passed/$total passed ($failed failed) [skip ci]" || echo "no changes to commit"
        git push origin HEAD || echo "push failed"
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: junit-results
        path: test-results/
        retention-days: 30
    
